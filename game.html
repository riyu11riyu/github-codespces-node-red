<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple Shooting Game</title>
<style>
  canvas { background: #000; display: block; margin: 0 auto; }
</style>
</head>
<body>
<canvas id="game" width="400" height="600"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const player = { x: canvas.width / 2 - 15, y: canvas.height - 30, w: 30, h: 15, speed: 5 };
const bullets = [];
const enemies = [];
let score = 0;
let keys = {};
let startTime = Date.now();
let gameOver = false;

function spawnEnemy() {
  const x = Math.random() * (canvas.width - 30);
  enemies.push({ x, y: -20, w: 30, h: 20, speed: 2 });
}
setInterval(spawnEnemy, 1000);

function update() {
  if (keys['ArrowLeft']) player.x -= player.speed;
  if (keys['ArrowRight']) player.x += player.speed;
  player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));
  bullets.forEach((b, i) => {
    b.y -= b.speed;
    if (b.y < -10) bullets.splice(i, 1);
  });
  enemies.forEach((e, ei) => {
    e.y += e.speed;
    if (e.y > canvas.height) enemies.splice(ei, 1);
    bullets.forEach((b, bi) => {
      if (b.x < e.x + e.w && b.x + b.w > e.x && b.y < e.y + e.h && b.y + b.h > e.y) {
        enemies.splice(ei, 1);
        bullets.splice(bi, 1);
        score++;
      }
    });
  });

  if (Date.now() - startTime > 60000 && score < 10) {
    gameOver = true;
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (gameOver) {
    ctx.fillStyle = 'white';
    ctx.fillText('Game Over', canvas.width / 2 - 40, canvas.height / 2);
    ctx.fillText(`Score: ${score}`, canvas.width / 2 - 40, canvas.height / 2 + 20);
    return;
  }

  ctx.fillStyle = 'white';
  ctx.fillRect(player.x, player.y, player.w, player.h);
  bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));
  ctx.fillStyle = 'red';
  enemies.forEach(e => ctx.fillRect(e.x, e.y, e.w, e.h));
  ctx.fillStyle = 'white';
  ctx.fillText(`Score: ${score}`, 10, 20);
  const timeLeft = Math.max(0, 60 - Math.floor((Date.now() - startTime) / 1000));
  ctx.fillText(`Time: ${timeLeft}`, 10, 40);
}

function loop() {
  update();
  draw();
  if (!gameOver) {
    requestAnimationFrame(loop);
  }
}

loop();

window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') {
    if (!gameOver) {
      bullets.push({ x: player.x + player.w / 2 - 2.5, y: player.y, w: 5, h: 10, speed: 7 });
    }
  }
});
window.addEventListener('keyup', e => keys[e.key] = false);
</script>
</body>
</html>
